<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>審查意見與預算金額驗算器 (邏輯保留版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- 介面樣式 (使用優化版 CSS) --- */
        :root {
            --primary: #0056b3;
            --sec: #007bff;
            --acc: #28a745;
            --bg: #f4f6f9;
            --text: #333;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 1em;
            line-height: 1.6;
        }

        h1,
        h2,
        h3 {
            color: var(--primary);
        }

        h1 {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 0.5em;
        }

        section {
            background: #fff;
            padding: 1.5em;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5em;
        }

        /* 輸入框與按鈕 */
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
            justify-content: center;
        }

        button {
            padding: 0.6em 1.2em;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            color: white;
            background: var(--sec);
            font-size: 1em;
            transition: 0.2s;
        }

        button:hover {
            background: var(--primary);
        }

        button.btn-green {
            background: var(--acc);
        }

        button.btn-green:hover {
            background: #218838;
        }

        button.btn-grey {
            background: #6c757d;
        }

        button.btn-grey:hover {
            background: #5a6268;
        }

        /* 表格樣式 (保留 Sticky Header) */
        .table-responsive {
            overflow-x: auto;
            max-height: 600px;
            border: 1px solid #ddd;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: #fff;
            font-size: 0.9em;
        }

        th {
            background: #e9ecef;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: bold;
            border-bottom: 2px solid #ccc;
            padding: 8px;
        }

        td {
            border-bottom: 1px solid #eee;
            border-right: 1px solid #eee;
            padding: 8px;
            vertical-align: top;
        }

        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            background: inherit;
            z-index: 11;
            border-right: 2px solid #ddd;
        }

        /* 狀態顏色 (沿用原本邏輯的 class) */
        .error,
        .incorrect {
            background-color: #f8d7da;
            color: #721c24;
            font-weight: bold;
        }

        .correct {
            background-color: #d4edda;
            color: #155724;
            font-weight: bold;
        }

        .partial {
            background-color: #fff3cd;
            color: #856404;
            font-weight: bold;
        }

        .data-suspect {
            background-color: #ffe0cc;
            color: #b35900;
            font-weight: bold;
        }

        .amount-only {
            background-color: #e0ecff;
            color: #2a5db0;
        }

        .format-error-text {
            color: #dc3545;
            font-weight: bold;
        }

        /* 工具區域 */
        .dashboard {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            justify-content: center;
        }

        .dash-card {
            background: #fff;
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: center;
        }

        .dash-num {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }

        #loadingIndicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 9999;
        }

        .vertical-sum-section {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #b8daff;
        }

        /* 預覽分類區域 */
        .preview-container {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .preview-legend {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.85em;
        }

        .preview-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .preview-legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }

        .preview-line {
            padding: 6px 10px;
            margin: 3px 0;
            border-radius: 4px;
            font-size: 0.9em;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .preview-line-num {
            color: #999;
            font-size: 0.8em;
            min-width: 24px;
            text-align: right;
            flex-shrink: 0;
            padding-top: 1px;
        }

        .preview-line-text {
            flex: 1;
            word-break: break-all;
        }

        .preview-line.parsable {
            background: #d4edda;
            border-left: 4px solid #28a745;
        }

        .preview-line.data-suspect-line {
            background: #ffe0cc;
            border-left: 4px solid #e67300;
        }

        .preview-line.amount-only-line {
            background: #e0ecff;
            border-left: 4px solid #4a90d9;
        }

        .preview-line.narrative-line {
            background: #f0f0f0;
            border-left: 4px solid #aaa;
            color: #777;
        }

        .preview-line.empty-line {
            background: transparent;
            color: #ccc;
            font-style: italic;
        }

        .preview-summary {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
            color: #555;
        }

        .preview-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .preview-actions button {
            padding: 2px 6px;
            font-size: 0.75em;
            min-width: auto;
            border-radius: 3px;
            background: #e9ecef;
            color: #495057;
            border: 1px solid #ced4da;
            cursor: pointer;
            transition: 0.15s;
        }

        .preview-actions button:hover {
            background: #dee2e6;
        }

        .preview-actions button.btn-merge {
            background: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }

        .preview-actions button.btn-merge:hover {
            background: #b1dfbb;
        }

        .preview-actions button.btn-del {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }

        .preview-actions button.btn-del:hover {
            background: #f1b0b7;
        }

        .preview-apply-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
    </style>
</head>

<body>

    <header>
        <h1>預算審查品管員 (Logic Preserved v2.1)</h1>
    </header>

    <main>
        <div id="loadingIndicator" class="hidden">正在運算中...</div>

        <section>
            <h3>1. 資料驗算</h3>
            <div style="margin-bottom: 10px;">
                <label style="margin-right:15px;"><input type="radio" name="verifierMode" value="tabular" checked
                        onchange="UIManager.updateMode()"> 表格模式</label>
                <label><input type="radio" name="verifierMode" value="textual" onchange="UIManager.updateMode()">
                    文字敘述模式</label>
            </div>

            <textarea id="inputArea" placeholder="請貼上資料..."></textarea>

            <div class="btn-group">
                <button id="btnPreview" class="hidden" onclick="TextualVerifier.previewClassification()"
                    style="background:#6f42c1;">🔍 預覽斷句分類</button>
                <button onclick="App.runVerification()">🚀 進行驗算</button>
                <button class="btn-grey" onclick="UIManager.clearAllData()">🗑️ 清除資料</button>
                <button class="btn-green" onclick="ExportManager.exportTable('tabularResultTable', '驗算結果.csv')">📥 匯出
                    Excel (CSV)</button>
            </div>

            <div id="previewContainer" class="preview-container hidden"></div>

            <div id="resultContainer" class="hidden">
                <div id="dashboard" class="dashboard hidden">
                    <div class="dash-card">總筆數<span class="dash-num" id="dashTotal">0</span></div>
                    <div class="dash-card" style="color:#155724; background:#d4edda;">正確<span class="dash-num"
                            id="dashCorrect">0</span></div>
                    <div class="dash-card" style="color:#721c24; background:#f8d7da;">錯誤<span class="dash-num"
                            id="dashError">0</span></div>
                </div>

                <div id="tabularResultsBlock">
                    <div id="horizontalResult" class="table-responsive"></div>

                    <aside id="verticalSumUiSection" class="vertical-sum-section hidden">
                        <h3>上下散總驗算</h3>
                        <label>選擇總計列：<select id="totalRowSelect">
                                <option value="">-- 請選擇 --</option>
                            </select></label>
                        <button onclick="TabularVerifier.calculateVerticalSum()">計算</button>
                        <div id="verticalSumResult" class="table-responsive" style="margin-top:10px;"></div>
                    </aside>

                    <div id="trendChartContainer" class="hidden"
                        style="margin-top:20px; padding:10px; background:#fff;">
                        <button class="btn-green" onclick="TabularVerifier.generateTrendChart()">📊 產生趨勢圖</button>
                        <div id="chartArea" style="margin-top:10px;"></div>
                    </div>
                </div>

                <div id="textualResultsBlock" class="hidden">
                    <div id="textualModeResults" class="table-responsive"></div>
                </div>
            </div>
        </section>

        <section>
            <h3>2. 計畫金額加總</h3>
            <textarea id="projectSumInput" placeholder="請貼上包含多個計畫金額的文字..."></textarea>
            <div class="btn-group">
                <button class="btn-green" onclick="ProjectSummator.sumProjectAmounts()">➕ 加總金額</button>
                <button class="btn-grey" onclick="ProjectSummator.clearProjectData()">清除</button>
            </div>
            <div id="projectSumResult"></div>
        </section>
    </main>

    <script>
        // --- 1. Utility (原封不動保留) ---
        const Utils = {
            escapeHTML: function (str) {
                if (str === null || str === undefined) return '';
                return String(str).replace(/[&<>"']/g, function (match) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[match];
                });
            },
            formatNumberDisplay: function (n, isPercentContext = false, originalInputForZeroCheck = null) {
                if (originalInputForZeroCheck === "-" && Object.is(n, 0) && !isPercentContext) return "-";
                if (String(n).trim() === "-") return "-";
                if (typeof n === 'string' && (n.includes('%') || n.includes('％'))) return n;
                const num = parseFloat(String(n).replace(/,/g, ''));
                if (isNaN(num)) return String(n);
                if (num === 0 && !isPercentContext && String(originalInputForZeroCheck).trim() !== "0") return "-";
                let formatted = num.toLocaleString('zh-Hant', { minimumFractionDigits: (isPercentContext ? 2 : 0), maximumFractionDigits: (isPercentContext ? 2 : 2) });
                if (isPercentContext) formatted += '％';
                return formatted;
            },
            formatChineseMoneyDisplay: function (num) {
                if (typeof num !== 'number' || isNaN(num)) return String(num);
                if (num === 0) return "0元";
                const isNegative = num < 0;
                let absoluteNum = Math.abs(num);
                let parts = [];
                const yi = Math.floor(absoluteNum / 100000000); absoluteNum %= 100000000;
                if (yi > 0) parts.push(`${yi.toLocaleString('zh-Hant')}億`);
                const wan = Math.floor(absoluteNum / 10000); let remainderBelowWan = absoluteNum % 10000;
                if (wan > 0) parts.push(`${wan.toLocaleString('zh-Hant')}萬`);
                let remainderStr = '';
                if (remainderBelowWan > 0) {
                    if (remainderBelowWan % 1000 === 0 && remainderBelowWan >= 1000) remainderStr = `${Math.floor(remainderBelowWan / 1000)}千`;
                    else remainderStr = remainderBelowWan.toLocaleString('zh-Hant');
                }
                if (remainderStr) parts.push(remainderStr);
                let finalString = parts.join('');
                if (parts.length === 0 && num !== 0) finalString = Math.abs(num).toLocaleString('zh-Hant');
                if (finalString && !finalString.endsWith('元')) finalString += '元';
                else if (!finalString && num === 0) finalString = "0元";
                if (isNegative) return `短絀${finalString}`;
                return finalString;
            }
        };

        // --- 2. 新增功能: Export Manager ---
        const ExportManager = {
            exportTable: function (tableId, filename) {
                const table = document.getElementById(tableId);
                if (!table) return alert("無資料可匯出");
                let csv = [];
                const rows = table.querySelectorAll("tr");
                for (let i = 0; i < rows.length; i++) {
                    const row = [], cols = rows[i].querySelectorAll("td, th");
                    for (let j = 0; j < cols.length; j++) {
                        if (j === 0) continue; // Skip Checkbox
                        const select = cols[j].querySelector("select");
                        let data = select ? (select.value === 'subtract' ? '-' : '+') : cols[j].innerText.replace(/"/g, '""');
                        row.push(`"${data}"`);
                    }
                    csv.push(row.join(","));
                }
                const blob = new Blob(["\uFEFF" + csv.join("\n")], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
            }
        };

        // --- 3. UI Manager (微調以適應舊邏輯) ---
        const UIManager = {
            updateMode: function () {
                const mode = document.querySelector('input[name="verifierMode"]:checked').value;
                document.getElementById("inputArea").placeholder = mode === "tabular" ? "請貼上原始表格..." : "請貼上文字敘述...";
                document.getElementById("tabularResultsBlock").classList.toggle("hidden", mode !== "tabular");
                document.getElementById("textualResultsBlock").classList.toggle("hidden", mode !== "textual");
                document.getElementById("dashboard").classList.add("hidden");
                document.getElementById("btnPreview").classList.toggle("hidden", mode !== "textual");
                document.getElementById("previewContainer").classList.add("hidden");
                document.getElementById("previewContainer").innerHTML = "";
            },
            clearAllData: function () {
                document.getElementById("inputArea").value = "";
                document.getElementById("horizontalResult").innerHTML = "";
                document.getElementById("textualModeResults").innerHTML = "";
                document.getElementById("verticalSumResult").innerHTML = "";
                document.getElementById("verticalSumUiSection").classList.add("hidden");
                document.getElementById("trendChartContainer").classList.add("hidden");
                document.getElementById("chartArea").innerHTML = "";
                document.getElementById("dashboard").classList.add("hidden");
                document.getElementById("previewContainer").classList.add("hidden");
                document.getElementById("previewContainer").innerHTML = "";
                TabularVerifier.parsedTableData = [];
            },
            updateDashboard: function (total, correct, error) {
                document.getElementById("dashTotal").innerText = total;
                document.getElementById("dashCorrect").innerText = correct;
                document.getElementById("dashError").innerText = error;
                document.getElementById("dashboard").classList.remove("hidden");
            },
            showLoading: function (show) { document.getElementById('loadingIndicator').classList.toggle('hidden', !show); }
        };

        // --- 4. Tabular Verifier (完全保留原始邏輯) ---
        // *僅將 UI 輸出的 DOM ID 對應到新版 ID*
        const TabularVerifier = {
            parsedTableData: [],
            _isPercentage: function (str) { const s = String(str).trim(); return s.endsWith('%') || s.endsWith('％'); },
            _cleanNumber: function (str) { const s = String(str).trim(); if (s === "-") return 0; if (this._isPercentage(s)) { return parseFloat(s.substring(0, s.length - 1).replace(/,/g, '')) || 0; } const num = parseFloat(s.replace(/,/g, '')); return s === '' ? NaN : (isNaN(num) ? 0 : num); },
            _formatAndCheckCellContent: function (originalValueStr, isColumnC = false) { let displayValue = Utils.escapeHTML(originalValueStr); let cellHtml = ''; let hasError = false; let errorMessage = ''; const trimmedOriginal = String(originalValueStr).trim(); if (isColumnC && trimmedOriginal === "0") { hasError = true; errorMessage = "(應將0修正為-)"; displayValue = "0"; } else if (trimmedOriginal.includes('%') && !trimmedOriginal.includes('％')) { hasError = true; errorMessage = "(百分比符號應修正為全形)"; let numericPart = trimmedOriginal.replace('%', ''); const num = parseFloat(numericPart.replace(/,/g, '')); if (!isNaN(num)) { displayValue = Utils.escapeHTML(num.toLocaleString('zh-Hant') + '%'); } } else if (trimmedOriginal.includes('％')) { let numericPart = trimmedOriginal.replace('％', ''); const num = parseFloat(numericPart.replace(/,/g, '')); if (!isNaN(num)) { displayValue = Utils.escapeHTML(num.toLocaleString('zh-Hant') + '％'); } } else if (trimmedOriginal === "-") { displayValue = "-"; } else { const num = parseFloat(trimmedOriginal.replace(/,/g, '')); if (!isNaN(num)) { displayValue = Utils.escapeHTML(Utils.formatNumberDisplay(num, false, trimmedOriginal)); } } cellHtml = `<span class="${hasError ? 'format-error-text' : ''}">${displayValue}</span>`; if (hasError) { cellHtml += `<span class="format-error-message">${Utils.escapeHTML(errorMessage)}</span>`; } return cellHtml; },

            _processRow: function (item, prev1_str, prev2_str, valA_str, valB_str, valC_str, rowIndex) {
                // ... (Logic kept exactly as original) ...
                const isPercentRowABC = this._isPercentage(valA_str) || this._isPercentage(valB_str) || this._isPercentage(valC_str);
                const isPrev1Percent = this._isPercentage(prev1_str);
                const isPrev2Percent = this._isPercentage(prev2_str);

                let missingValues = [];
                if (valA_str.trim() === '') missingValues.push('A欄');
                if (valB_str.trim() === '') missingValues.push('B欄');
                if (valC_str.trim() === '') missingValues.push('C欄');

                const prev1_num = this._cleanNumber(prev1_str);
                const prev2_num = this._cleanNumber(prev2_str);
                const A_num = this._cleanNumber(valA_str);
                const B_num = this._cleanNumber(valB_str);
                const C_num = this._cleanNumber(valC_str);

                let D_calc_num = NaN;
                let diff_num = NaN;

                if (missingValues.length === 0 && typeof A_num === 'number' && typeof B_num === 'number' && !isNaN(A_num) && !isNaN(B_num)) {
                    D_calc_num = A_num + B_num;
                    if (typeof C_num === 'number' && !isNaN(C_num)) {
                        diff_num = C_num - D_calc_num;
                        if (Math.abs(diff_num) < 0.00001) diff_num = 0;
                        else if (isPercentRowABC) { diff_num = parseFloat(diff_num.toFixed(5)); if (Math.abs(diff_num) < 0.00001) diff_num = 0; }
                    }
                }

                const isCorrect = (diff_num === 0 && typeof diff_num === 'number');
                let percChangeVsPrev1 = NaN;
                if (typeof C_num === 'number' && !isNaN(C_num) && typeof prev1_num === 'number' && !isNaN(prev1_num) && prev1_num !== 0) { percChangeVsPrev1 = ((C_num - prev1_num) / Math.abs(prev1_num)) * 100; }
                else if (typeof C_num === 'number' && !isNaN(C_num) && prev1_num === 0 && C_num === 0) { percChangeVsPrev1 = 0; }

                let percChangeVsPrev2 = NaN;
                if (typeof C_num === 'number' && !isNaN(C_num) && typeof prev2_num === 'number' && !isNaN(prev2_num) && prev2_num !== 0) { percChangeVsPrev2 = ((C_num - prev2_num) / Math.abs(prev2_num)) * 100; }
                else if (typeof C_num === 'number' && !isNaN(C_num) && prev2_num === 0 && C_num === 0) { percChangeVsPrev2 = 0; }

                const rowData = { item, prev1: prev1_num, prev2: prev2_num, A: A_num, B: B_num, C: C_num, D: D_calc_num, isPrev1Percent, isPrev2Percent, isPercentABC: isPercentRowABC, originalStrings: { prev1: prev1_str, prev2: prev2_str, A: valA_str, B: valB_str, C: valC_str, D_calc_str: isNaN(D_calc_num) ? '' : Utils.formatNumberDisplay(D_calc_num, isPercentRowABC, D_calc_num) }, percChangeVsPrev1, percChangeVsPrev2 };

                let rowHtml = `<tr>
            <td><input type="checkbox" class="detail-checkbox" data-row-index="${rowIndex}" aria-label="選擇第 ${rowIndex + 1} 行明細"></td>
            <td>${Utils.escapeHTML(item)}</td>
            <td><select class="detail-sign" aria-label="選擇此列 ${Utils.escapeHTML(item)} 為加項或減項"><option value="add" selected>+</option><option value="subtract">-</option></select></td>
            <td>${this._formatAndCheckCellContent(prev1_str)}</td>
            <td>${this._formatAndCheckCellContent(prev2_str)}</td>
            <td>${this._formatAndCheckCellContent(valA_str)}</td>
            <td>${this._formatAndCheckCellContent(valB_str)}</td>
            <td>${this._formatAndCheckCellContent(valC_str, true)}</td>
            <td>${isNaN(percChangeVsPrev1) ? '-' : Utils.formatNumberDisplay(percChangeVsPrev1, true)}</td>
            <td>${isNaN(percChangeVsPrev2) ? '-' : Utils.formatNumberDisplay(percChangeVsPrev2, true)}</td>
            <td>${Utils.escapeHTML(rowData.originalStrings.D_calc_str)}</td>`;

                if (missingValues.length > 0) {
                    rowHtml += `<td>-</td><td class="partial">資料缺失: ${missingValues.join(', ')}</td>`;
                } else if (isNaN(diff_num)) {
                    rowHtml += `<td>-</td><td class="error">格式錯誤</td>`;
                } else if (isCorrect) {
                    rowHtml += `<td class="correct">${Utils.escapeHTML(Utils.formatNumberDisplay(0, isPercentRowABC))}</td><td class="correct">無錯位</td>`;
                } else {
                    rowHtml += `<td class="error">${Utils.escapeHTML(Utils.formatNumberDisplay(diff_num, isPercentRowABC))}</td>`;
                    const diffInCents = Math.round(diff_num * 100);
                    if (diffInCents % 9 === 0 && diffInCents !== 0) {
                        rowHtml += `<td class="error">差異可被9整除</td>`;
                    } else {
                        rowHtml += `<td class="error">錯誤</td>`;
                    }
                }
                rowHtml += '</tr>';
                return { htmlRow: rowHtml, data: rowData, isError: !isCorrect }; // Added isError for dashboard
            },

            calculate: function () {
                const input = document.getElementById("inputArea").value.trim();
                const lines = input.split(/\n+/);
                this.parsedTableData = [];
                const totalRowSelect = document.getElementById("totalRowSelect");
                totalRowSelect.innerHTML = '<option value="">-- 請選擇 --</option>';

            get M_STD_PATTERN() { return new RegExp(String.raw`^(.*?)(?:(?:：\s*主管機關核列|核列)\s*)?(${this.M_AMT_SRC})\s*，\s*(.*?)\s*(?:擬\s*)?(${this.M_OP_TYPES_SRC})\s*(?:([^，0-9元億萬千仟百佰拾]*?)\s*)?(${this.M_AMT_SRC})\s*，\s*(?:本處核列|核列|暫核列)\s*(${this.M_AMT_SRC})`); },

            parseMoneyString: function (moneyStr) { if (!moneyStr || typeof moneyStr !== 'string') return null; let originalFullStr = moneyStr.trim(); let processedStr = moneyStr.trim(); if (processedStr === "無列數") return 0; let isDeficit = false; if (processedStr.startsWith("短絀")) { isDeficit = true; processedStr = processedStr.substring("短絀".length).trim(); } else if (processedStr.startsWith("賸餘")) { processedStr = processedStr.substring("賸餘".length).trim(); } let total = 0; let tempStr = processedStr.replace(/元|,/g, ''); const units = [{ unit: "億", value: 100000000 }, { unit: "萬", value: 10000 }, { unit: "千", alt: "仟", value: 1000 }, { unit: "百", alt: "佰", value: 100 }, { unit: "拾", value: 10 }]; for (const u of units) { const regex = new RegExp(`([\\d.]+)(${u.unit}${u.alt ? '|' + u.alt : ''})`); const match = tempStr.match(regex); if (match) { total += parseFloat(match[1]) * u.value; tempStr = tempStr.replace(match[0], ''); } } if (tempStr.length > 0 && !isNaN(parseFloat(tempStr))) { total += parseFloat(tempStr); } else if (tempStr.length > 0 && tempStr.match(/[^\d.]/)) { if (total === 0 && originalFullStr !== "0" && !originalFullStr.toLowerCase().includes("無列數")) { return null; } } if (isDeficit && total > 0) { total *= -1; } if (total === 0 && originalFullStr !== "0" && !originalFullStr.toLowerCase().includes("無列數") && !(originalFullStr.startsWith("賸餘") && processedStr === "0") && !(originalFullStr.startsWith("短絀") && processedStr === "0")) { if (tempStr.replace(/\./g, '').match(/[^\d]/)) { return null; } } return total; },
            cleanDescription: function (desc) { if (!desc) return ""; return desc.replace(/^\s*[\d一二三四五六七八九十甲乙丙丁戊己庚辛壬癸子丑]+\s*[\.、．]?\s*(\uff08[一二三四五六七八九十甲乙丙丁戊己庚辛壬癸子丑]+\uff09|\([一二三四五六七八九十甲乙丙丁戊己庚辛壬癸子丑]+\))?\s*/, '').replace(/[：:\s]*$/, '').trim(); },
            // --- 敘述句智慧分類輔助方法 ---
            _extractAmountTokens: function (line) {

                    const textToParse = itemText.trim();
                    const M_MONEY_PART = String.raw`[\d,]+\s*(?:億|萬|千|仟|百|佰|拾|元)?[\d,萬千仟百佰拾元]*元`;
                    const moneyExtractorRegex = new RegExp(`(${M_MONEY_PART})`);
                    const match = textToParse.match(moneyExtractorRegex);

                    if (match) {
                        const amount = this.parseMoneyString(match[1]);
                        if (typeof amount === 'number' && !isNaN(amount)) {
                            totalSum += amount;
                            resultHtml += `<tr><td>${Utils.escapeHTML(textToParse)}</td><td>${Utils.formatNumberDisplay(amount)}</td><td class="correct">成功</td></tr>`;
                        } else {
                            resultHtml += `<tr><td>${Utils.escapeHTML(textToParse)}</td><td>-</td><td class="error">解析失敗</td></tr>`;
                        }
                    } else {
                        resultHtml += `<tr><td>${Utils.escapeHTML(textToParse)}</td><td>-</td><td class="partial">無金額</td></tr>`;
                    }
                });

                resultHtml += `</tbody></table><p style="margin-top:10px; font-weight:bold;">總計：${Utils.formatNumberDisplay(totalSum)} 元 (${Utils.formatChineseMoneyDisplay(totalSum)})</p>`;
                resultDiv.innerHTML = resultHtml;
            },
            clearProjectData: function () {
                document.getElementById('projectSumInput').value = '';
                document.getElementById('projectSumResult').innerHTML = '';
            }
        };

        // --- 7. Main ---
        const App = {
            runVerification: function () {
                UIManager.showLoading(true);
                setTimeout(() => {
                    try {
                        const mode = document.querySelector('input[name="verifierMode"]:checked').value;
                        if (mode === "tabular") TabularVerifier.calculate();
                        else TextualVerifier.checkContent();
                    } catch (e) {
                        console.error(e);
                        alert("驗算發生錯誤，請檢查資料格式。");
                    } finally {
                        UIManager.showLoading(false);
                    }
                }, 10);
            }
        };

        document.addEventListener('DOMContentLoaded', () => { UIManager.updateMode(); });
    </script>
</body>

</html>
